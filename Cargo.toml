[package]
name = "redwood"
version = "0.1.0"
edition = "2021"

[features]
default = []

[dependencies]
clap = { version = "4.0", features = ["derive"] }
xxhash-rust = { version = "0.8", features = ["xxh3"] }
walkdir = "2.0"
glob = "0.3"
which = "6.0"
rayon = "1.10"
tempfile = "3.0"
rusqlite = { version = "0.32", features = ["bundled"] }

[dev-dependencies]

