harness = false

[[bench]]
name = "full_tc_small"
harness = false

[[bench]]
name = "daemon"
harness = false

[[bench]]
name = "parser"
harness = false

[[bench]]
name = "profile_hotspots"
harness = false

[[bench]]
name = "lazy_tc_benchmark"
harness = false

